# Gold Rush custom Gitleaks config
# Extends default Gitleaks rules with stack-specific detectors.
# Reference: https://github.com/gitleaks/gitleaks#configuration

title = "Gold Rush Gitleaks Config"

[extend]
useDefault = true

# ─────────────────────────────────────────────────────
# Clerk
# ─────────────────────────────────────────────────────
[[rules]]
id = "clerk-secret-key"
description = "Clerk secret key"
regex = '''sk_(live|test)_[A-Za-z0-9]{40,}'''
tags = ["key", "clerk", "critical"]

[[rules]]
id = "clerk-webhook-secret"
description = "Clerk webhook signing secret (Svix)"
regex = '''whsec_[A-Za-z0-9+/=]{32,}'''
tags = ["secret", "clerk", "webhook", "critical"]

# ─────────────────────────────────────────────────────
# Supabase
# ─────────────────────────────────────────────────────
[[rules]]
id = "supabase-service-role-jwt"
description = "Supabase service_role JWT"
# PostgreSQL JWTs with service_role
regex = '''eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'''
tags = ["jwt", "supabase", "critical"]
# Narrow to context: only flag if "service_role" appears within 200 chars
[[rules.allowlists]]
regexTarget = "match"
regexes = [
  # Skip test fixtures / sample tokens
  '''test-fixture''',
]
# Cloudflare Access "meta" tokens are public protocol JWTs (payload contains
# "type":"meta") — published in /.well-known and fetched by every edge node.
# They share the eyJ…eyJ…sig shape but are NOT credentials. Skip CF Access
# probe artifacts captured during pre-deploy verification.
[[rules.allowlists]]
paths = [
  '''vercel-probe.*\.txt''',
  '''cloudflareaccess''',
]

[[rules]]
id = "supabase-url-production"
description = "Supabase project URL"
regex = '''https://[a-z0-9]{20,}\.supabase\.co'''
tags = ["url", "supabase"]
# Public Supabase project URLs (e.g. `https://<ref>.supabase.co`) are not
# secrets — they ship in every browser request the app makes and are
# protected by per-environment anon keys + RLS. They appear in
# product-catalog claim files as `connect_hint` / `urls.supabase` metadata
# describing where the deployed app talks to Supabase. Allowlist them in
# claim files only; everywhere else this rule still fires.
# `product-catalog/claims/...` matches monorepo-root scans;
# `claims/...` matches sub-repo scans where SCAN_ROOT == product-catalog.
[[rules.allowlists]]
description = "Public Supabase project URLs in product-catalog claim files are non-secret connect-hint metadata"
paths = [
  '''(^|/)product-catalog/claims/[A-Za-z0-9._-]+\.json$''',
  '''(^|/)claims/[A-Za-z0-9._-]+\.json$''',
]

# ─────────────────────────────────────────────────────
# Stripe
# ─────────────────────────────────────────────────────
[[rules]]
id = "stripe-live-secret-key"
description = "Stripe LIVE secret key"
regex = '''sk_live_[A-Za-z0-9]{24,}'''
tags = ["key", "stripe", "critical", "production"]

[[rules]]
id = "stripe-restricted-key"
description = "Stripe restricted key"
regex = '''rk_(live|test)_[A-Za-z0-9]{24,}'''
tags = ["key", "stripe"]

[[rules]]
id = "stripe-webhook-secret"
description = "Stripe webhook signing secret"
regex = '''whsec_[A-Za-z0-9]{32,}'''
tags = ["secret", "stripe", "webhook"]
# Note: same pattern as Clerk webhook — rely on filepath context

# ─────────────────────────────────────────────────────
# Google Maps (used by pool-pulse)
# ─────────────────────────────────────────────────────
[[rules]]
id = "google-maps-api-key"
description = "Google Maps / Cloud API key"
regex = '''AIza[0-9A-Za-z_-]{35}'''
tags = ["key", "google"]

# ─────────────────────────────────────────────────────
# Resend (transactional email)
# ─────────────────────────────────────────────────────
# Resend keys are base62 (a-z, A-Z, 0-9). Earlier regex included _- which
# matched Python identifiers like `re_gate_on_complete` → 63 false positives
# in the gold-rush-ops scan (tests + mission-control state docs).
[[rules]]
id = "resend-api-key"
description = "Resend API key"
regex = '''re_[A-Za-z0-9]{16,}'''
tags = ["key", "resend", "email"]

# ─────────────────────────────────────────────────────
# LLM providers
# ─────────────────────────────────────────────────────
[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[A-Za-z0-9_-]{30,}'''
tags = ["key", "llm", "anthropic", "critical"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-proj-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{48,}'''
tags = ["key", "llm", "openai", "critical"]

# ─────────────────────────────────────────────────────
# PostHog (analytics)
# ─────────────────────────────────────────────────────
[[rules]]
id = "posthog-personal-api-key"
description = "PostHog personal API key"
regex = '''phx_[A-Za-z0-9]{40,}'''
tags = ["key", "posthog"]

# ─────────────────────────────────────────────────────
# Firecrawl (used by prospector MCP)
# ─────────────────────────────────────────────────────
[[rules]]
id = "firecrawl-api-key"
description = "Firecrawl API key"
regex = '''fc-[A-Za-z0-9]{32,}'''
tags = ["key", "firecrawl"]

# ─────────────────────────────────────────────────────
# Vercel
# ─────────────────────────────────────────────────────
[[rules]]
id = "vercel-token"
description = "Vercel deployment token"
regex = '''(?i)vercel[_-]?token[\"'\s:=]+[A-Za-z0-9]{24,}'''
tags = ["key", "vercel"]

# ─────────────────────────────────────────────────────
# Sentry
# ─────────────────────────────────────────────────────
[[rules]]
id = "sentry-auth-token"
description = "Sentry auth token"
regex = '''sntrys_[A-Za-z0-9+/=]{32,}'''
tags = ["key", "sentry"]

# ─────────────────────────────────────────────────────
# Global allowlist (paths that never flag)
# ─────────────────────────────────────────────────────
[allowlist]
description = "Global allowlist"
paths = [
  '''\.env\.example''',
  '''\.env\.sample''',
  '''\.env\.local\.example''',
  '''__fixtures__/''',
  '''__snapshots__/''',
  '''__tests__/''',
  '''\.playwright-mcp/''',
  '''\.claude/security-reports/''',
  '''\.claude/security/semgrep/''',
  '''archive/''',
  '''node_modules/''',
  '''\.next/''',
  '''coverage/''',
  '''dist/''',
  '''build/''',
  # Operator state + ops harness — Python identifiers like
  # `re_gate_on_complete` and mock strings like `slice_trigger_stp001_now`
  # are not credentials. (gold-rush-ops only.)
  '''^tests/''',
  '''/tests/''',
  '''^mission-control/''',
  '''/mission-control/''',
  # Bandit JSON output contains code snippets which trip generic detectors
  '''bandit\.json$''',
]
regexes = [
  # Placeholder strings commonly used in examples
  '''(?i)your[_-]?(api|secret|key|token)[_-]?here''',
  '''(?i)replace[_-]?me''',
  '''xxx+''',
  '''sk_test_00000''',
]
